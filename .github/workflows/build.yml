name: Build FR

on:
  push:
    branches: [macos, master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  GAME_VERSION: "0.98a"

jobs:
  build-arm-natives:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: patches

      - name: Cache ARM natives
        id: cache-natives
        uses: actions/cache@v5
        with:
          path: arm-natives
          key: arm-natives-${{ hashFiles('patches/lwjgl2-native-fullscreen.patch', '.github/workflows/build.yml') }}

      - uses: actions/setup-java@v5
        if: steps.cache-natives.outputs.cache-hit != 'true'
        with:
          distribution: temurin
          java-version: '17'

      - name: Build liblwjgl arm64
        if: steps.cache-natives.outputs.cache-hit != 'true'
        run: |
          mkdir -p arm-natives
          git clone https://github.com/shadowfacts/lwjgl2-arm64.git
          cd lwjgl2-arm64
          git checkout 08c5bb19
          git apply "$GITHUB_WORKSPACE/patches/lwjgl2-native-fullscreen.patch"
          sed -i '' 's/source="1.7"/source="1.8"/g; s/target="1.7"/target="1.8"/g' \
            build.xml platform_build/build-generator.xml
          ant generate-all compile headers
          mkdir -p bin/lwjgl && cd bin/lwjgl
          ant -f ../../platform_build/macosx_ant/build.xml \
            -Djvm_headers_path="$JAVA_HOME/include/" nativelibrary
          cp liblwjgl.dylib "$GITHUB_WORKSPACE/arm-natives/"

      - name: Get openal arm64
        if: steps.cache-natives.outputs.cache-hit != 'true'
        run: |
          brew install openal-soft
          cp $(brew --prefix openal-soft)/lib/libopenal.dylib arm-natives/openal.dylib

      - uses: actions/upload-artifact@v5
        with:
          name: arm-natives
          path: arm-natives/*

  build-intel-natives:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: patches

      - name: Cache Intel natives
        id: cache-intel
        uses: actions/cache@v5
        with:
          path: intel-natives
          key: intel-natives-${{ hashFiles('patches/lwjgl2-native-fullscreen.patch', '.github/workflows/build.yml') }}

      - uses: actions/setup-java@v5
        if: steps.cache-intel.outputs.cache-hit != 'true'
        with:
          distribution: temurin
          java-version: '17'

      - name: Build liblwjgl x86_64
        if: steps.cache-intel.outputs.cache-hit != 'true'
        run: |
          mkdir -p intel-natives
          git clone https://github.com/shadowfacts/lwjgl2-arm64.git
          cd lwjgl2-arm64
          git checkout 08c5bb19
          git apply "$GITHUB_WORKSPACE/patches/lwjgl2-native-fullscreen.patch"
          sed -i '' 's/source="1.7"/source="1.8"/g; s/target="1.7"/target="1.8"/g' \
            build.xml platform_build/build-generator.xml
          sed -i '' \
            's/-arch arm64/-arch x86_64/g;
             s|dir="arm64"|dir="x86_64"|g;
             s|location="arm64"|location="x86_64"|g;
             s|path="arm64"|path="x86_64"|g;
             s|file="arm64/liblwjgl-arm64.dylib"|file="x86_64/liblwjgl-x86_64.dylib"|g;
             s|value="liblwjgl-arm64.dylib"|value="liblwjgl-x86_64.dylib"|g;
             s|-ljawt|-Wl,-undefined,dynamic_lookup|g' \
            platform_build/macosx_ant/build.xml
          ant generate-all compile headers
          mkdir -p bin/lwjgl && cd bin/lwjgl
          ant -f ../../platform_build/macosx_ant/build.xml \
            -Djvm_headers_path="$JAVA_HOME/include/" nativelibrary
          cp liblwjgl.dylib "$GITHUB_WORKSPACE/intel-natives/"

      - uses: actions/upload-artifact@v5
        with:
          name: intel-natives
          path: intel-natives/*

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Cache krak2
        id: cache-krak2
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/krak2
          key: krak2-6da0abc

      - name: Install krak2
        if: steps.cache-krak2.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/Storyyeller/Krakatau --rev 6da0abc

      - name: Download dependencies
        run: |
          mkdir -p jars/lib
          cd jars/lib
          BASE=https://repo1.maven.org/maven2
          curl -sLO $BASE/org/lwjgl/lwjgl/lwjgl/2.9.3/lwjgl-2.9.3.jar
          curl -sLO $BASE/org/lwjgl/lwjgl/lwjgl_util/2.9.3/lwjgl_util-2.9.3.jar
          curl -sLO $BASE/log4j/log4j/1.2.9/log4j-1.2.9.jar
          curl -sLO $BASE/org/codehaus/janino/janino/2.7.8/janino-2.7.8.jar
          curl -sLO $BASE/org/codehaus/janino/commons-compiler/2.7.8/commons-compiler-2.7.8.jar
          curl -sLO $BASE/com/thoughtworks/xstream/xstream/1.4.10/xstream-1.4.10.jar
          curl -sLO $BASE/org/json/json/20231013/json-20231013.jar

      - name: Compile Java
        run: |
          CP="jars/compile/fr.jar:jars/compile/api_stubs.jar"
          CP="$CP:jars/overrides/starfarer_obf.jar:jars/overrides/fs.common_obf.jar"
          CP="$CP:$(echo jars/lib/*.jar | tr ' ' ':')"
          javac --release 17 -cp "$CP" \
            -sourcepath modules/renderer/src:modules/proxy/src:modules/methods/src \
            -d build/classes \
            $(find modules/renderer/src \
              -name "*.java" ! -name "*.kt")

      - name: Copy resources
        run: |
          find modules/renderer/src -type f ! -name "*.java" ! -name "*.kt" | while read f; do
            dest="build/classes/${f#modules/renderer/src/}"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done

      - name: Assemble overrides
        run: |
          cd assembly/overrides
          find . -name "*.j" | zip /tmp/overrides.zip -@ -q
          krak2 asm --out $GITHUB_WORKSPACE/build/classes /tmp/overrides.zip

      - name: Package
        run: |
          jar cf build/fr.jar -C build/classes com/genir -C build/classes com/fs -C build/classes mappings
          mkdir -p out
          cp build/fr.jar fr.bat fr.vmparams FR_SS.ico readme.txt out/

      - uses: actions/upload-artifact@v5
        with:
          name: fr-windows
          path: out/*

  build-macos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache krak2
        id: cache-krak2-mac
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/krak2
          key: krak2-6da0abc

      - name: Install krak2
        if: steps.cache-krak2-mac.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/Storyyeller/Krakatau --rev 6da0abc

      - name: Download dependencies
        run: |
          mkdir -p jars/lib
          cd jars/lib
          BASE=https://repo1.maven.org/maven2
          curl -sLO $BASE/org/lwjgl/lwjgl/lwjgl/2.9.3/lwjgl-2.9.3.jar
          curl -sLO $BASE/org/lwjgl/lwjgl/lwjgl_util/2.9.3/lwjgl_util-2.9.3.jar
          curl -sLO $BASE/log4j/log4j/1.2.9/log4j-1.2.9.jar
          curl -sLO $BASE/org/codehaus/janino/janino/2.7.8/janino-2.7.8.jar
          curl -sLO $BASE/org/codehaus/janino/commons-compiler/2.7.8/commons-compiler-2.7.8.jar
          curl -sLO $BASE/com/thoughtworks/xstream/xstream/1.4.10/xstream-1.4.10.jar
          curl -sLO $BASE/org/json/json/20231013/json-20231013.jar

      - name: Compile Java
        run: |
          CP="jars/compile/fr.jar:jars/compile/api_stubs.jar"
          CP="$CP:jars/overrides/starfarer_obf.jar:jars/overrides/fs.common_obf.jar"
          CP="$CP:$(echo jars/lib/*.jar | tr ' ' ':')"
          javac --release 17 -cp "$CP" \
            -sourcepath modules/renderer/src:modules/proxy/src:modules/methods/src \
            -d build/classes \
            $(find modules/renderer/src -name "*.java" ! -name "*.kt")

      - name: Copy resources
        run: |
          find modules/renderer/src -type f ! -name "*.java" ! -name "*.kt" | while read f; do
            dest="build/classes/${f#modules/renderer/src/}"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done

      - name: Rewrite overrides for macOS
        run: python3 scripts/rewrite_j_files.py --platform macos

      - name: Assemble overrides
        run: |
          cd assembly/overrides
          find . -name "*.j" | zip /tmp/overrides.zip -@ -q
          krak2 asm --out $GITHUB_WORKSPACE/build/classes /tmp/overrides.zip

      - name: Package
        run: |
          mkdir -p build/META-INF
          echo "Manifest-Version: 1.0" > build/META-INF/MANIFEST.MF
          echo "Premain-Class: com.genir.renderer.loaders.ModTransformAgent" >> build/META-INF/MANIFEST.MF
          jar cfm build/fr.jar build/META-INF/MANIFEST.MF -C build/classes com/genir -C build/classes com/fs -C build/classes mappings
          mkdir -p out/Contents/MacOS out/Contents/Resources/Java
          cp build/fr.jar out/Contents/Resources/Java/
          cp scripts/starsector_mac.sh out/Contents/MacOS/starsector_mac.sh
          cp scripts/starsector_mac.sh.original out/Contents/MacOS/starsector_mac.sh.original
          chmod +x out/Contents/MacOS/starsector_mac.sh

      - uses: actions/upload-artifact@v5
        with:
          name: fr-macos
          path: out

  package-macos-arm:
    needs: [build-macos, build-arm-natives]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: fr-macos
          path: pkg

      - uses: actions/download-artifact@v5
        with:
          name: arm-natives
          path: arm-natives

      - name: Download Temurin 25 ARM64
        run: |
          curl -sL "https://api.adoptium.net/v3/binary/latest/25/ga/mac/aarch64/jre/hotspot/normal/eclipse?project=jdk" -o temurin.tar.gz
          mkdir -p jre
          tar xzf temurin.tar.gz --strip-components=3 -C jre

      - name: Add ARM components
        run: |
          # ARM JRE
          cp -a jre pkg/Contents/Home-arm

          # ARM natives
          mkdir -p pkg/Contents/Resources/Java/native/macosx-arm
          cp arm-natives/liblwjgl.dylib pkg/Contents/Resources/Java/native/macosx-arm/
          cp arm-natives/openal.dylib pkg/Contents/Resources/Java/native/macosx-arm/

          # ARM webp-imageio (prebuild from Maven Central, stock jar untouched)
          curl -sL "https://repo1.maven.org/maven2/io/github/darkxanter/webp-imageio/0.3.3/webp-imageio-0.3.3.jar" \
            -o pkg/Contents/Resources/Java/native/macosx-arm/webp-imageio-0.1.6.jar

      - uses: actions/upload-artifact@v5
        with:
          name: fr-macos-arm
          path: pkg

  release:
    needs: [build-windows, build-macos, package-macos-arm, build-intel-natives]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5

      - name: Prepare release
        run: |
          cd fr-windows && zip -qr ../fr-windows.zip * && cd ..
          chmod +x fr-macos/Contents/MacOS/starsector_mac.sh
          cd fr-macos && zip -qr ../fr-macos.zip Contents && cd ..
          chmod +x fr-macos-arm/Contents/MacOS/starsector_mac.sh
          chmod +x fr-macos-arm/Contents/Home-arm/bin/*
          cd fr-macos-arm && zip -qr ../fr-macos-arm.zip Contents && cd ..
          cp arm-natives/liblwjgl.dylib liblwjgl-arm64.dylib
          cp intel-natives/liblwjgl.dylib liblwjgl-x86_64.dylib

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            fr-windows.zip
            fr-macos.zip
            fr-macos-arm.zip
            liblwjgl-arm64.dylib
            liblwjgl-x86_64.dylib
